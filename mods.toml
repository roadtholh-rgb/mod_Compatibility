description='''
Epic Fight compatibility addon for Guard Villagers.

=========================
Required Mods
=========================
- Epic Fight 20.9.7
- Guard Villagers 1.6.7
- Epic Fight Resurrection 0.1.18-fix2
- Epic ACG 20.9.6.0.fix4
- Weapons Of Miracles 20.1.8.5
- MO Falchion 20.9.0
- Duel Of The End 1.1.3
- Indestructible 20.9.2
- Invincible 20.9.16
- Give Me A Infernal 1.5
- Give Me More EFNT 1.5
- Lazy Utilities 1.7
- MO Enchantments 2.0

=========================
IMPORTANT
=========================
Required Resource Pack:

GuardEpicTexturesRewritten.zip

Place it in:
.minecraft/resourcepacks/

Enable it before entering a world.

Without the resource pack, Guard Villagers models
will render incorrectly (misaligned / distorted).
'''

